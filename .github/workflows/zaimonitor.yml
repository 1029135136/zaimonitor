name: ZAI Inference Monitor (Coding Plan)

on:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - script/**

  schedule:
    - cron: "*/40 * * * *"   # every 40 minutes (UTC)

  workflow_dispatch:

concurrency:
  group: zaimonitor-coding-plan
  cancel-in-progress: false

jobs:
  monitor_coding_plan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: script

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor (coding_plan endpoint, both models)
        run: |
          set +e
          failures=0
          for model in glm-5 glm-4.7 glm-4.7-flash; do
            echo "::group::coding_plan / ${model}"
            ZAI_BASE_URL="https://open.bigmodel.cn/api/coding/paas/v4" \
            ZAI_MODEL="${model}" \
            python monitor_zai_inference.py
            status=$?
            echo "::endgroup::"
            if [ "${status}" -ne 0 ]; then
              failures=1
              echo "Run failed for coding_plan/${model} with exit code ${status}"
            fi
          done
          exit "${failures}"
        env:
          # Required
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          AUTO_LOAD_DOTENV: "false"
